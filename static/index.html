    <!-- SVG Ink Spreading Filter -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true" focusable="false">
        <defs>
            <filter id="ink-spread-filter" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" result="displaced" />
                <feGaussianBlur in="displaced" stdDeviation="2" result="blurred" />
                <feComponentTransfer in="blurred" result="ink">
                    <feFuncA type="discrete" tableValues="0 0 0 1 1" />
                </feComponentTransfer>
                <feMerge>
                    <feMergeNode in="ink" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>
    </svg>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--ink-black);">印章設定</h2>
            <div class="setting-item">
                <label for="seal-name">印章文字 (2-4 字):</label>
                <input type="text" id="seal-name" maxlength="4" placeholder="例如：漢語新解">
            </div>
            <div class="setting-item">
                <label for="seal-font">選擇字體:</label>
                <select id="seal-font">
                    <option value="'Noto Serif TC', serif">標楷體 (Noto Serif)</option>
                    <option value="'Ma Shan Zheng', cursive">毛筆大氣 (Ma Shan Zheng)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="save-settings" class="premium-btn" style="margin-top: 20px;">儲存設定</button>
            </div>
        </div>
    </div>
    <!-- History Sidebar -->
    <div id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>歷史回響</h2>
            <button id="close-history" class="icon-btn">&times;</button>
        </div>
        <div id="history-list" class="sidebar-content">
            <!-- History items will be injected here -->
        </div>
        <div class="sidebar-footer">
            <button id="clear-history" class="text-btn">清空長卷</button>
        </div>
    </div>

    <script src="js/app_v3.js?v=2026.03.15.2"></script>
    <script>
        // Service Worker Registration with Dev Isolation
        if ('serviceWorker' in navigator) {
            const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
            if (isLocal) {
                // 開發環境：主動解除註冊所有 Service Worker，避免快取衝突
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    for (const registration of registrations) {
                        registration.unregister();
                        console.log('✅ [Dev] Service Worker unregistered');
                    }
                });
            } else {
                // 正式環境：正常註冊
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => console.log('✅ Service Worker registered:', reg.scope))
                        .catch(err => console.error('❌ Service Worker registration failed:', err));
                });
            }
        }
    </script>
